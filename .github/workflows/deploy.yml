name: Deploy to Cloud Run

# Disparo manual apenas — nunca em push.
#
# Secrets do GitHub Actions (Settings > Secrets and variables > Actions):
#   GCP_PROJECT_ID, GCP_REGION, GCP_WORKLOAD_IDENTITY_PROVIDER,
#   GCP_SERVICE_ACCOUNT, GCP_ARTIFACT_REPO
# Configurados em 2026-07-01 — ver docs/decisions.md para os nomes de
# service accounts, pool/provider WIF e secrets do Secret Manager.
#
# `web` é uma SPA estática: VITE_API_URL é embutido no build (Vite não lê
# env var em runtime), por isso o passo de build busca a URL pública atual
# do serviço `fluxowork-api` no Cloud Run antes de montar a imagem.

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App a deployar'
        required: true
        type: choice
        options: [api, web]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & deploy ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth no Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configura Docker para o Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push da imagem
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ inputs.app }}:${{ github.sha }}"

          BUILD_ARGS=()
          if [ "${{ inputs.app }}" = "web" ]; then
            API_URL=$(gcloud run services describe fluxowork-api --region "${{ secrets.GCP_REGION }}" --project "${{ secrets.GCP_PROJECT_ID }}" --format 'value(status.url)')
            BUILD_ARGS+=(--build-arg "VITE_API_URL=$API_URL")
          fi

          docker build -f apps/${{ inputs.app }}/Dockerfile "${BUILD_ARGS[@]}" -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy no Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ inputs.app }}:${{ github.sha }}"

          EXTRA_FLAGS=()
          if [ "${{ inputs.app }}" = "api" ]; then
            # --set-env-vars SUBSTITUI todas as env vars da revisão (não faz merge com
            # o que já estava setado manualmente) — por isso WEB_ORIGIN precisa estar
            # aqui sempre, senão um deploy da api reseta o CORS pra localhost e quebra
            # o web em produção silenciosamente (aconteceu em 2026-07-02).
            WEB_URL=$(gcloud run services describe fluxowork-web --region "${{ secrets.GCP_REGION }}" --project "${{ secrets.GCP_PROJECT_ID }}" --format 'value(status.url)' 2>/dev/null || echo "")
            ENV_VARS="NODE_ENV=production,JWT_ACCESS_TTL=15m,REFRESH_TOKEN_TTL_DAYS=30"
            if [ -n "$WEB_URL" ]; then
              ENV_VARS="$ENV_VARS,WEB_ORIGIN=$WEB_URL"
            fi
            EXTRA_FLAGS+=(
              --service-account fluxowork-api-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
              --add-cloudsql-instances "${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:fluxowork-dev"
              --set-secrets "DATABASE_URL=fluxowork-api-database-url:latest,JWT_ACCESS_SECRET=fluxowork-api-jwt-secret:latest"
              --set-env-vars "$ENV_VARS"
            )
          elif [ "${{ inputs.app }}" = "web" ]; then
            EXTRA_FLAGS+=(
              --service-account fluxowork-web-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            )
          fi

          gcloud run deploy fluxowork-${{ inputs.app }} \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --allow-unauthenticated \
            "${EXTRA_FLAGS[@]}" \
            --quiet
